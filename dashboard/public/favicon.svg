<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient: Deep Tech Blue to Tech Purple -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2563EB" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Outer Shield Outline with Glow -->
  <path d="M 256, 48 C 344, 48 424, 76 432, 176 C 432, 288 344, 384 256, 448 C 168, 384 80, 288 80, 176 C 88, 76 168, 48 256, 48 Z" 
        fill="url(#shieldGrad)" 
        filter="url(#glow)" />

  <!-- Inner Shield Highlight Line (for a 3D glass effect) -->
  <path d="M 256, 72 C 324, 72 388, 94 394, 180 C 394, 268 324, 348 256, 404 C 188, 348 118, 268 118, 180 C 124, 94 188, 72 256, 72 Z" 
        stroke="#FFFFFF" 
        stroke-width="6" 
        stroke-opacity="0.15" />

  <!-- Modern Video Camera Symbol -->
  <!-- Camera Body -->
  <rect x="160" y="200" width="130" height="90" rx="16" fill="#FFFFFF" />
  
  <!-- Camera Lens Section (Cone) -->
  <path d="M 290, 220 L 345, 185 C 352, 180 360, 185 360, 193 L 360, 297 C 360, 305 352, 310 345, 305 L 290, 270 Z" fill="#FFFFFF" />
  
  <!-- Camera Lens Inner Detail -->
  <path d="M 335, 213 L 350, 203 L 350, 287 L 335, 277 Z" fill="#E2E8F0" opacity="0.8" />

  <!-- Lens Aperture Glass Glow -->
  <circle cx="225" cy="245" r="24" fill="#0F172A" />
  <circle cx="225" cy="245" r="14" fill="#2563EB" opacity="0.6" />
  <circle cx="221" cy="241" r="5" fill="#FFFFFF" opacity="0.8" />

  <!-- Active Status Led (CamGuard Green) -->
  <circle cx="185" cy="225" r="8" fill="#16A34A" />
  <!-- Small Inner Glow of the Led -->
  <circle cx="185" cy="225" r="3" fill="#86EFAC" />
</svg>