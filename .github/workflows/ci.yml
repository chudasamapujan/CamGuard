name: CamGuard CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify Python Syntax & Modules
        run: |
          python -c "import compileall; compileall.compile_dir('simulator', force=True); compileall.compile_dir('backend', force=True)"

      - name: Run Pytest Test Suite
        env:
          TESTING: 'true'
          RATELIMIT_ENABLED: 'false'
        run: |
          pytest backend/tests -v --cov=backend --cov-report=xml --cov-report=term

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  frontend-test:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dashboard
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest Unit Tests
        run: npm test -- --run

      - name: Build Production Bundle
        run: npm run build

  docker-build:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: camguard-backend:ci

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          tags: camguard-frontend:ci

      - name: Build Simulator Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.simulator
          push: false
          tags: camguard-simulator:ci
